<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sea Tycoon Defense</title><style>html,body{margin:0;height:100%;background:#061426;color:#eaf6ff;font-family:Tahoma,Arial,sans-serif;overflow:hidden}#game{width:100vw;height:100vh;display:block;background:linear-gradient(#06213d,#083d57)}.ui{position:fixed;inset:0;pointer-events:none}.menu{position:absolute;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 30% 20%,#22d3ee55,transparent 30%),#061426ee;pointer-events:auto;text-align:center;padding:20px}.card{max-width:720px}.title{font-size:clamp(40px,8vw,86px);font-weight:900;line-height:.95;color:#67e8f9}.sub{color:#bfd3e8;line-height:1.8}.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:22px}button{border:1px solid #7dd3fc77;background:#0f2946cc;color:white;border-radius:18px;padding:16px;font:inherit;font-weight:900;cursor:pointer}.hud{position:absolute;top:10px;left:10px;right:10px;display:flex;gap:8px;align-items:center;pointer-events:auto}.box{background:#020817cc;border:1px solid #7dd3fc55;border-radius:14px;padding:8px 12px;font-size:14px}.bottom{position:absolute;bottom:10px;left:10px;right:10px;display:grid;gap:8px;pointer-events:auto}.lanes,.abilities{display:grid;gap:7px}.lanes{grid-template-columns:repeat(5,1fr)}.abilities{grid-template-columns:repeat(4,1fr)}.prep{position:absolute;inset:0;background:#061426f2;padding:18px;pointer-events:auto;overflow:auto}.rooms{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:10px;max-width:1000px;margin:auto}.room{background:#0f2946;border:1px solid #7dd3fc55;border-radius:18px;padding:14px;text-align:right}.room b{display:block;color:#fff}.room span{color:#facc15;font-size:13px}.start{margin:15px auto;display:block;width:min(320px,100%);background:linear-gradient(135deg,#0891b2,#7c3aed)}@media(max-width:700px){.modes,.rooms{grid-template-columns:1fr}.hud{flex-wrap:wrap}.abilities{grid-template-columns:repeat(2,1fr)}} </style></head><body><canvas id="game"></canvas><div class="ui" id="ui"></div><script>const c=document.getElementById('game'),x=c.getContext('2d'),ui=document.getElementById('ui');let W,H;function fit(){W=c.width=innerWidth;H=c.height=innerHeight}addEventListener('resize',fit);fit();const rooms=['القيادة','المدافع','المحركات','الترسانة','الدرع','المخزن','الرادار','الطاقم'];let state='menu',mode='normal',wave=0,gold=180,levels=rooms.map(_=>0),hp=260,maxHp=260,ammo=25,enemies=[],shots=[],last=0,left=0,spawn=0,kills=0,earned=0,env='صافٍ',cd={q:0,w:0,e:0,r:0},freeze=0,fast=0;function laneY(i){return 120+(H-250)*((i+.5)/5)}function stats(){return{hp:240+levels[0]*45,power:24+levels[1]*8,delay:Math.max(.16,.56-levels[2]*.07),ammo:25+levels[3]*5,armor:Math.min(.45,levels[4]*.05),bonus:1+levels[5]*.14,time:45+levels[6]*5,cool:Math.max(.45,1-levels[7]*.08)}}function menu(){state='menu';ui.innerHTML='<div class="menu"><div class="card"><div class="title">SEA TYCOON DEFENSE</div><p class="sub">تايكون دفاع بحري: طور سفينتك من الداخل، وادافع عنها من الخارج عبر 5 مسارات.</p><div class="modes"><button onclick="start(\'normal\')">⚓ عادي</button><button onclick="start(\'blitz\')">⚡ بليتز x2</button><button onclick="start(\'endless\')">♾️ لا نهاية</button></div></div></div>'}function start(m){mode=m;wave=0;gold=180;levels=rooms.map(_=>0);prep()}function cost(i){return Math.floor(80*Math.pow(1.6,levels[i])+i*18)}function prep(){state='prep';let html='<div class="prep"><h1>مرحلة التجهيز - الموجة '+(wave+1)+'</h1><p>الذهب: <b style="color:#facc15">'+gold+'</b></p><div class="rooms">';rooms.forEach((r,i)=>html+='<div class="room"><b>'+r+'</b><p>LV '+levels[i]+'/5</p><span>التكلفة '+cost(i)+'</span><br><button onclick="up('+i+')">ترقية</button></div>');html+='</div><button class="start" onclick="battle()">ابدأ الهجوم</button></div>';ui.innerHTML=html}function up(i){if(levels[i]<5&&gold>=cost(i)){gold-=cost(i);levels[i]++;prep()}}function battle(){state='battle';let s=stats();wave++;hp=maxHp=s.hp;ammo=s.ammo;enemies=[];shots=[];kills=0;earned=0;left=7+wave*2+(wave%3==0?1:0);spawn=0;env=['صافٍ','ضباب','عاصفة','ليل','مد عارم'][Math.floor(Math.random()*5)];cd={q:0,w:0,e:0,r:0};freeze=0;fast=0;ui.innerHTML='<div class="hud"><div class="box" id="h"></div><div class="box">Q وابل</div><div class="box">W إصلاح</div><div class="box">E سرعة</div><div class="box">R تجميد</div></div><div class="bottom"><div class="lanes">'+[1,2,3,4,5].map(n=>'<button onclick="fire('+(n-1)+')">مسار '+n+'</button>').join('')+'</div><div class="abilities"><button onclick="ability(\'q\')">Q وابل</button><button onclick="ability(\'w\')">W إصلاح</button><button onclick="ability(\'e\')">E سرعة</button><button onclick="ability(\'r\')">R تجميد</button></div></div>'}function spawnEnemy(){let boss=wave%3==0&&left==1,l=Math.floor(Math.random()*5),e=boss?{hp:900+wave*25,spd:28,coin:140,col:'#f97316',boss:1}:{hp:80+wave*8,spd:45+Math.random()*35,coin:15+wave*2,col:['#22c55e','#facc15','#ef4444'][Math.floor(Math.random()*3)]};if(mode=='blitz'){e.spd*=1.5;e.coin*=2}e.max=e.hp;e.x=W+40;e.l=l;enemies.push(e);left--}function fire(l,free){let now=performance.now()/1000,s=stats();if(!free&&now-last<s.delay)return;if(!free&&ammo<=0)return;if(!free){ammo--;last=now}shots.push({x:110,l,p:s.power*(fast>0?1.25:1),v:650*(fast>0?1.75:1)})}function ability(k){let s=stats();if(cd[k]>0)return;if(k=='q'){for(let i=0;i<5;i++)fire(i,true);cd.q=10*s.cool}if(k=='w'){hp=Math.min(maxHp,hp+maxHp*.25);cd.w=15*s.cool}if(k=='e'){fast=6;cd.e=9*s.cool}if(k=='r'){freeze=3.5;cd.r=13*s.cool}}function end(win){state='result';if(win){let b=Math.floor((40+wave*18)*stats().bonus*(mode=='blitz'?2:1));gold+=b;earned+=b}ui.innerHTML='<div class="menu"><div class="card"><div class="title">'+(win?'WAVE CLEARED':'SHIP DOWN')+'</div><p class="sub">الموجة: '+wave+'<br>القتل: '+kills+'<br>الذهب المكتسب: '+earned+'</p><button onclick="'+(win?'prep()':'menu()')+'">'+(win?'الموجة التالية':'القائمة')+'</button></div></div>'}function update(dt){if(state!='battle')return;Object.keys(cd).forEach(k=>cd[k]=Math.max(0,cd[k]-dt));freeze=Math.max(0,freeze-dt);fast=Math.max(0,fast-dt);spawn-=dt;if(left>0&&spawn<=0){spawnEnemy();spawn=Math.max(.45,1.15-wave*.02)}let es=freeze>0?0:1;if(env=='مد عارم')es*=1.3;let bs=env=='عاصفة'?.75:1;enemies.slice().forEach(e=>{e.x-=e.spd*es*dt;if(e.x<85){hp-=35*(1-stats().armor);enemies.splice(enemies.indexOf(e),1)}});shots.slice().forEach(s=>{s.x+=s.v*bs*dt;if(s.x>W+20)shots.splice(shots.indexOf(s),1);enemies.slice().forEach(e=>{if(e.l==s.l&&Math.abs(e.x-s.x)<36){e.hp-=s.p;shots.splice(shots.indexOf(s),1);if(e.hp<=0){let g=Math.floor(e.coin*stats().bonus);gold+=g;earned+=g;kills++;enemies.splice(enemies.indexOf(e),1)}}})});if(hp<=0)end(false);if(left<=0&&enemies.length==0)end(true)}function draw(){x.clearRect(0,0,W,H);if(state=='battle'){x.fillStyle='#03182c';x.fillRect(0,0,W,H);for(let i=0;i<5;i++){x.strokeStyle='#23607a';x.beginPath();x.moveTo(0,laneY(i));x.lineTo(W,laneY(i));x.stroke()}x.fillStyle='#2563eb';x.fillRect(25,120,55,H-250);x.fillStyle='#22c55e';x.fillRect(25,88,Math.max(0,220*hp/maxHp),12);enemies.forEach(e=>{let y=laneY(e.l);x.fillStyle=e.col;x.roundRect(e.x-35,y-22,70,44,18);x.fill();x.fillStyle='#ef4444';x.fillRect(e.x-35,y-32,70,5);x.fillStyle='#22c55e';x.fillRect(e.x-35,y-32,70*Math.max(0,e.hp/e.max),5)});shots.forEach(s=>{x.fillStyle='#facc15';x.beginPath();x.arc(s.x,laneY(s.l),7,0,7);x.fill()});let h=document.getElementById('h');if(h)h.innerHTML='HP '+Math.floor(hp)+'/'+maxHp+' | موجة '+wave+' | ذهب '+gold+' | ذخيرة '+ammo+' | '+env}}let lastT=performance.now();function loop(t){let dt=(t-lastT)/1000;lastT=t;update(dt);draw();requestAnimationFrame(loop)}addEventListener('keydown',e=>{if(state=='menu'&&['1','2','3'].includes(e.key))start(['normal','blitz','endless'][+e.key-1]);else if(state=='battle'){if('12345'.includes(e.key))fire(+e.key-1);if('qwer'.includes(e.key.toLowerCase()))ability(e.key.toLowerCase())}});CanvasRenderingContext2D.prototype.roundRect??=function(x,y,w,h,r){this.beginPath();this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);return this};menu();requestAnimationFrame(loop)</script></body></html>
