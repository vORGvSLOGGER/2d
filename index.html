ar-gradient(135deg,#fff,#38bdf8)}.ship .h{position:absolute;left:8px;right:8px;bottom:25px;height:46px;border-radius:12px 12px 50px 50px;background:linear-gradient(#92400e,#431407);border:1px solid #facc1566}.ship em{position:absolute;left:0;right:0;bottom:0;background:#020617cc;border:1px solid #7dd3fc55;border-radius:99px;font-size:10px;font-style:normal;padding:4px}.enemy{position:absolute;width:74px;height:42px;border-radius:16px 32px 24px 10px;background:linear-gradient(135deg,#7f1d1d,#ef4444,#fca5a5);z-index:2}.enemy:before{content:"";position:absolute;right:18px;top:-18px;border-right:18px solid transparent;border-left:4px solid transparent;border-bottom:28px solid #fecaca}.enemy i{position:absolute;right:10px;bottom:-8px;height:5px;background:#22c55e;border-radius:99px}.shot{position:absolute;width:34px;height:8px;border-radius:99px;background:#facc15;box-shadow:0 0 18px #facc15;z-index:4}.hud{position:absolute;top:8px;right:8px;left:8px;display:grid;grid-template-columns:auto repeat(3,1fr) minmax(130px,1.4fr) 42px;gap:6px;pointer-events:auto}.box{min-height:40px;padding:6px 8px;border:1px solid #7dd3fc44;border-radius:14px;background:#020617bb;backdrop-filter:blur(8px)}.phase{display:grid;place-items:center;font-weight:900;background:#166534cc}.phase.attack{background:#7f1d1dcc}.box small{display:block;color:#b8c7d6;font-size:11px}.gold{color:#facc15}.meter{height:8px;background:#334155;border-radius:99px;overflow:hidden}.meter i{display:block;height:100%;background:linear-gradient(90deg,#22c55e,#22d3ee)}.menuBtn{display:grid;place-items:center;font-size:22px;cursor:pointer}.dock{position:absolute;right:10px;bottom:10px;left:10px;z-index:6;pointer-events:none}.build{display:flex;justify-content:space-between;gap:10px}.float,.laneBtn,.ab,.cmd,.choice button{border:1px solid #e0f2fe44;border-radius:14px;background:#1e293be6;cursor:pointer}.float{min-width:140px;min-height:54px;padding:9px 12px;pointer-events:auto;background:linear-gradient(135deg,#7c3aed,#0e7490);box-shadow:0 18px 45px #0008}.float.attack{background:linear-gradient(135deg,#be123c,#d97706);text-align:left}.attackDock{display:grid;grid-template-columns:.85fr 1fr;gap:8px}.tools,.lanes{padding:8px;border:1px solid #7dd3fc44;border-radius:18px;background:#020617c7;pointer-events:auto}.abs,.lanes{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.lanes{grid-template-columns:repeat(5,1fr)}.ab{min-height:40px;font-size:11px}.laneBtn{min-height:50px;font-weight:900}.log{position:absolute;left:12px;bottom:74px;max-width:380px;display:grid;gap:3px;padding:8px 10px;border:1px solid #7dd3fc44;border-radius:16px;background:#020617aa}.log p{margin:0;color:#b8c7d6;font-size:12px}.ok{color:#bbf7d0!important}.bad{color:#fecaca!important}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:10px;background:#02061799;pointer-events:auto}.panel,.modal{width:min(950px,calc(100vw - 14px));max-height:calc(100dvh - 18px);overflow:hidden;border:1px solid #7dd3fc44;border-radius:22px;background:#020817fb;box-shadow:0 24px 70px #000c}.head{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:13px;border-bottom:1px solid #7dd3fc44}.head h2{margin:0}.x{width:42px;height:42px;border:1px solid #7dd3fc44;border-radius:14px;background:#334155cc}.body{display:grid;grid-template-columns:minmax(350px,1fr) 300px;gap:12px;padding:12px}.view{position:relative;min-height:400px;overflow:hidden;border:1px solid #7dd3fc33;border-radius:18px;background:#0f172acc;touch-action:none}.mapIn{position:absolute;width:760px;height:420px}.cut{position:absolute;left:28px;top:64px;width:690px;height:270px;border-radius:55% 45% 48% 54%;background:linear-gradient(#78350f,#431407);border:2px solid #facc154d}.room{position:absolute;width:112px;min-height:84px;display:grid;place-items:center;padding:7px;border:1px solid #e0f2fe44;border-radius:18px;background:#0f172add;cursor:pointer}.room.sel{border-color:#facc15;box-shadow:0 0 0 2px #facc1533}.room span{font-size:24px}.card{display:grid;align-content:start;gap:10px;padding:14px;border:1px solid #7dd3fc33;border-radius:18px;background:#0f172add}.card h3{margin:0;color:#e0f2fe}.price{display:flex;justify-content:space-between;background:#1e293b;padding:8px;border-radius:12px}.choice{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.choice button{min-height:48px;font-weight:900}.modal{width:min(430px,calc(100vw - 20px));display:grid;gap:12px;padding:15px}@media(max-width:760px){.cards{grid-template-columns:1fr}.hud{grid-template-columns:repeat(4,1fr) 42px}.hud .box:last-of-type{grid-column:1/-1}.attackDock{grid-template-columns:1fr}.abs{grid-template-columns:repeat(2,1fr)}.body{grid-template-columns:1fr;overflow:auto;max-height:calc(100dvh - 95px)}.view{min-height:300px}.log{display:none}.ship{left:4px;transform:translateY(-50%) scale(.88);transform-origin:left center}}
</style></head><body><div id="app"><main id="game"><div id="scene"></div><div id="ui"></div><div id="layer"></div></main></div><script type="module">
const q=s=>document.querySelector(s),scene=q('#scene'),ui=q('#ui'),layer=q('#layer'),fmt=new Intl.NumberFormat('ar-SA');
const rooms=[['helm','قمرة القيادة','☸',45,40,'بدن وتحكم وتجهيز'],['cannons','المدافع','💥',165,82,'ضرر الإطلاق اليدوي'],['engines','المحركات','⚙',320,120,'سرعة تجهيز الطلقة'],['arsenal','الترسانة','🧨',490,78,'ذخيرة وقدرات'],['shield','غرفة الدرع','🛡',100,238,'حماية طوارئ'],['storage','المخزن','💰',275,260,'مكافآت الكنوز'],['radar','الرادار/البوصلة','🧭',445,248,'كشف وتوجيه'],['crew','غرفة الطاقم','👥',604,178,'مساعد وإصلاح']];
const R=Object.fromEntries(rooms.map(r=>[r[0],r])),fresh=()=>({version:2,coins:160,bestCycle:0,rooms:Object.fromEntries(rooms.map(r=>[r[0],1]))});
let P;try{P={...fresh(),...(JSON.parse(localStorage.seaProgress||'{}')),rooms:{...fresh().rooms,...((JSON.parse(localStorage.seaProgress||'{}')).rooms||{})}}}catch{P=fresh()}if(!localStorage.castleProgress)localStorage.castleProgress=JSON.stringify({version:1,note:'محفوظ للقلعة لاحقًا'});
let S={mode:'start',phase:'build',cycle:Math.max(1,P.bestCycle||1),sel:'helm',open:0,mini:null,off:{x:0,y:0},drag:null,logs:[],en:[],sh:[],last:performance.now(),cd:0,spawn:0,menu:0,ab:{}};
const save=()=>localStorage.seaProgress=JSON.stringify(P),lv=id=>P.rooms[id]||1,cost=id=>80+lv(id)*lv(id)*50+rooms.findIndex(r=>r[0]==id)*15;
function st(){return{hp:160+lv('helm')*32,shield:40+lv('shield')*24,energy:90+lv('crew')*8,ammo:18+lv('arsenal')*4,dmg:26+lv('cannons')*9,cd:Math.max(.34,.9-lv('engines')*.07),build:30+lv('helm')*4,attack:60+lv('radar')*3,reward:1+lv('storage')*.16}}
function log(m,c=''){S.logs.unshift([m,c]);S.logs=S.logs.slice(0,4)}
function reset(){let a=st();Object.assign(S,{phase:'build',end:performance.now()+a.build*1000,en:[],sh:[],hp:a.hp,maxHp:a.hp,shield:a.shield,maxShield:a.shield,energy:a.energy,maxEnergy:a.energy,ammo:a.ammo,maxAmmo:a.ammo,cd:0,spawn:1,ab:{barrage:{cd:0,n:2},assistant:{cd:0,t:0,until:0},emergency:{cd:0,n:1},boost:{cd:0,until:0}}})}
function sea(){S.mode='sea';reset();log('تم تجهيز السفينة. اضغط السفينة لفتح الداخل.','gold');render()}
function y(l){let top=122,bot=S.phase==='attack'?innerHeight-135:innerHeight-72;return top+(bot-top)*((l+.5)/5)}
function attack(){if(S.phase!=='build')return;S.phase='attack';S.end=performance.now()+st().attack*1000;S.en=[];S.sh=[];log('بدأ الهجوم البحري. الإطلاق يدوي.','bad')}
function fire(l,auto=0){if(S.phase!=='attack')return;let a=st(),fast=performance.now()<S.ab.boost.until;if(!auto){if(S.cd>0)return;if(S.ammo<=0)return log('الذخيرة خلصت. طور الترسانة.','bad');S.ammo--;S.cd=(fast?a.cd*.55:a.cd)}S.sh.push({x:116,y:y(l),l,d:a.dmg*(fast?1.15:1),v:740,auto})}
function ability(k){let a=S.ab[k];if(!a||a.cd>0||S.phase!=='attack')return;if(k==='barrage'&&a.n&&S.energy>=34){a.n--;a.cd=13;S.energy-=34;for(let i=0;i<5;i++)setTimeout(()=>fire(i,1),i*90);log('وابل المدافع انطلق.','ok')}if(k==='assistant'&&S.energy>=28){a.cd=18;a.until=performance.now()+7000;S.energy-=28;log('مساعد إطلاق مؤقت.','ok')}if(k==='emergency'&&a.n&&S.energy>=24){a.n--;a.cd=20;S.energy-=24;S.shield=Math.min(S.maxShield,S.shield+70);log('درع طوارئ.','ok')}if(k==='boost'&&S.energy>=38){a.cd=22;a.until=performance.now()+6500;S.energy-=38;log('تسريع المحركات.','ok')}}
function spawn(){let l=Math.random()*5|0,h=42+S.cycle*9;S.en.push({x:innerWidth+50,y:y(l),l,h,m:h,v:40+S.cycle*2.4,r:Math.round((10+S.cycle*2)*st().reward)})}
function done(ok=1){let r=Math.round((ok?70+S.cycle*14:28+S.cycle*5)*st().reward);P.coins+=r;if(ok){P.bestCycle=Math.max(P.bestCycle||0,S.cycle);S.cycle++;log(`انتهت الدورة: +${fmt.format(r)} عملة بحرية.`,'gold')}else log(`انسحاب بحري: +${fmt.format(r)} عملة.`,'bad');save();reset()}
function tick(dt){if(S.mode!=='sea')return;let now=performance.now();if(S.phase==='build'&&now>S.end)attack();if(S.phase==='attack'){if(now>S.end)done(1);S.spawn-=dt;if(S.spawn<=0){spawn();S.spawn=Math.max(.55,2.2-S.cycle*.06)}Object.values(S.ab).forEach(a=>a.cd=Math.max(0,a.cd-dt));S.cd=Math.max(0,S.cd-dt);S.energy=Math.min(S.maxEnergy,S.energy+dt*4);if(now<S.ab.assistant.until){S.ab.assistant.t-=dt;if(S.ab.assistant.t<=0){fire((S.en[0]?.l)??(Math.random()*5|0),1);S.ab.assistant.t=1}}}S.sh.forEach(o=>o.x+=o.v*dt);S.en.forEach(e=>e.x-=e.v*dt);for(const o of S.sh)for(const e of S.en)if(o.l===e.l&&Math.abs(o.x-e.x)<32){e.h-=o.d;o.hit=1;break}for(const e of S.en){if(e.h<=0&&!e.dead){e.dead=1;P.coins+=e.r;save()}if(e.x<92&&!e.crash){e.crash=1;let d=22+S.cycle*2,a=Math.min(S.shield,d);S.shield-=a;S.hp-=d-a;log('اصطدام ببدن السفينة.','bad')}}S.sh=S.sh.filter(o=>!o.hit&&o.x<innerWidth+80);S.en=S.en.filter(e=>!e.dead&&!e.crash);if(S.hp<=0)done(0)}
function start(){scene.innerHTML='';layer.innerHTML='';ui.innerHTML=`<section class="start"><div><div class="ey">Castle Tycoon Defense</div><h1>ماب البحر</h1><p>تجربة مستقلة: حفظ seaProgress، سفينة داخلية بـ ٨ غرف، خمس لاينات، إطلاق يدوي، قدرات مؤقتة، وكنوز بحرية. القلعة محفوظة لاحقًا بدون خلط.</p><div class="cards"><button class="map" data-a="sea"><b>🌊 ماب البحر</b><span>ادخل السفينة وابدأ الدورات البحرية.</span></button><button class="map off"><b>🏰 القلعة لاحقًا</b><span>castleProgress محفوظ لتحديث منفصل.</span></button></div><div class="mini gold">عملات البحر: ${fmt.format(P.coins)} · أفضل دورة: ${fmt.format(P.bestCycle||0)}</div></div></section>`}
function renderSea(full=1){let t=Math.max(0,Math.ceil((S.end-performance.now())/1000));scene.innerHTML=`${[0,1,2,3,4].map(i=>`<div class="lane" style="top:${y(i)}px"><i>${i+1}</i></div>`).join('')}<button class="ship" data-a="ship"><span class="s"></span><span class="h"></span><em>اضغط للترقية</em></button>${S.en.map(e=>`<div class="enemy" style="transform:translate(${e.x}px,${e.y-21}px)"><i style="width:${Math.max(8,e.h/e.m*46)}px"></i></div>`).join('')}${S.sh.map(o=>`<div class="shot" style="transform:translate(${o.x}px,${o.y-4}px)"></div>`).join('')}`;ui.innerHTML=`<section class="hud"><div class="box phase ${S.phase}">${S.phase==='build'?'تجهيز':'هجوم'}</div><div class="box"><small>الدورة</small><b>${S.cycle}</b></div><div class="box"><small>الوقت</small><b>${t}ث</b></div><div class="box"><small>العملات</small><b class="gold">${fmt.format(P.coins)}</b></div><div class="box"><small>صحة السفينة ${Math.ceil(S.hp)}/${S.maxHp}</small><div class="meter"><i style="width:${Math.max(0,S.hp/S.maxHp*100)}%"></i></div></div><button class="box menuBtn" data-a="menu">☰</button></section>${S.phase==='attack'?atkDock():buildDock()}${S.menu?menu():''}<div class="log">${S.logs.map(l=>`<p class="${l[1]}">${l[0]}</p>`).join('')}</div>`;if(full)panel()}
const buildDock=()=>`<section class="dock build"><button class="float" data-a="treasure"><b>كنز بحري</b><small>ميني قيم</small></button><button class="float attack" data-a="attack"><b>ابدأ الهجوم</b><small>دورة قتال</small></button></section>`;
const ab=k=>`<button class="ab" data-ab="${k}" ${S.ab[k].cd>0?'disabled':''}>${{barrage:'وابل',assistant:'مساعد',emergency:'درع',boost:'تسريع'}[k]}<br><span class="gold">${S.ab[k].cd>0?Math.ceil(S.ab[k].cd)+'ث':S.ab[k].n??'جاهز'}</span></button>`;
const atkDock=()=>`<section class="dock attackDock"><div class="tools"><div class="abs">${ab('barrage')}${ab('assistant')}${ab('emergency')}${ab('boost')}</div><div class="mini">الذخيرة ${S.ammo}/${S.maxAmmo} · الطاقة ${Math.round(S.energy)}</div></div><div class="lanes">${[0,1,2,3,4].map(i=>`<button class="laneBtn" data-lane="${i}">${i+1}</button>`).join('')}</div></section>`;
const menu=()=>`<aside class="menu"><button class="cmd" data-a="ship">داخل السفينة</button><button class="cmd" data-a="treasure">كنوز البحر</button><button class="cmd danger" data-a="reset">تصفير seaProgress فقط</button><button class="cmd" data-a="home">اختيار الماب</button></aside>`;
function panel(){if(S.mini)return mini();if(!S.open){layer.innerHTML='';return}let r=R[S.sel];layer.innerHTML=`<section class="overlay"><div class="panel"><header class="head"><div><div class="ey">داخل السفينة</div><h2>خريطة قابلة للسحب</h2></div><button class="x" data-a="close">×</button></header><div class="body"><div class="view" data-drag="1"><div class="mapIn" style="transform:translate(${S.off.x}px,${S.off.y}px)"><div class="cut"></div>${rooms.map(a=>`<button class="room ${a[0]===S.sel?'sel':''}" data-room="${a[0]}" style="left:${a[3]}px;top:${a[4]}px"><span>${a[2]}</span><b>${a[1]}</b><small class="gold">Lv ${lv(a[0])}</small></button>`).join('')}</div></div><aside class="card"><div class="ey">بطاقة ترقية</div><h3>${r[2]} ${r[1]}</h3><p>${r[5]}</p><ul><li>تأثير واضح على القتال/الدورة</li><li>ترقيات متوازنة للجوال</li></ul><div class="price"><span>المستوى</span><strong>${lv(r[0])}</strong></div><div class="price"><span>التكلفة</span><strong>${fmt.format(cost(r[0]))}</strong></div><button class="cmd primary" data-up="${r[0]}">ترقية الغرفة</button><p class="mini">لو انقفلت ترقية: طور بدن السفينة أولًا.</p></aside></div></div></section>`}
function mini(){let g=S.mini,body=g==='chest'?`<p>اختر صندوق كنز.</p><div class="choice">${[0,1,2].map(i=>`<button data-chest="${i}">صندوق ${i+1}</button>`).join('')}</div>`:g==='compass'?`<p>وجه البوصلة.</p><div class="choice">${['شمال','شرق','جنوب','غرب'].map(d=>`<button data-compass="${d}">${d}</button>`).join('')}</div>`:`<p>اربط الحبال بالترتيب: ⚓ 🪢 ⛵</p><div class="choice">${['⛵','⚓','🪢'].map(d=>`<button data-rope="${d}">${d}</button>`).join('')}</div><div class="mini">${(S.pick||[]).join(' ')}</div>`;layer.innerHTML=`<section class="overlay"><div class="modal"><div class="head"><h2>كنوز البحر</h2><button class="x" data-a="closeMini">×</button></div>${body}</div></section>`}
function reward(ok,m=1){let r=Math.round((30+S.cycle*4)*st().reward*m*(ok?1:.45));P.coins+=r;save();S.mini=null;log(`${ok?'كنز ناجح':'مكافأة جزئية'} +${fmt.format(r)}`,'gold');render()}
function up(id){let c=cost(id);if(P.coins<c)return log(`تحتاج ${fmt.format(c)} عملة بحرية.`,'bad');if(id!=='helm'&&lv(id)>=lv('helm')+2)return log('طور بدن السفينة أولًا.','bad');P.coins-=c;P.rooms[id]=lv(id)+1;save();log(`تمت ترقية ${R[id][1]}.`,'ok');render()}
function act(a){if(a==='sea')sea();if(a==='ship'){S.open=1;S.menu=0;render()}if(a==='close'){S.open=0;render()}if(a==='attack')attack();if(a==='menu'){S.menu=!S.menu;render()}if(a==='home'){S.mode='start';S.open=0;S.menu=0;S.mini=null;render()}if(a==='treasure'){S.mini=['chest','compass','rope'][Math.random()*3|0];S.pick=[];S.open=0;S.menu=0;render()}if(a==='closeMini'){S.mini=null;render()}if(a==='reset'){P=fresh();save();reset();log('تم تصفير حفظ البحر فقط.','bad');render()}}
document.addEventListener('click',e=>{let t=e.target.closest('button');if(!t)return;if(t.dataset.a)return act(t.dataset.a);if(t.dataset.lane!=null)return fire(+t.dataset.lane);if(t.dataset.ab)return ability(t.dataset.ab);if(t.dataset.room){S.sel=t.dataset.room;return panel()}if(t.dataset.up)return up(t.dataset.up);if(t.dataset.chest!=null)return reward(+t.dataset.chest===((lv('radar')+S.cycle)%3),1.6);if(t.dataset.compass){let d=['شمال','شرق','جنوب','غرب'];return reward(t.dataset.compass===d[(S.cycle+lv('radar'))%4],1.5)}if(t.dataset.rope){let seq=['⚓','🪢','⛵'];S.pick.push(t.dataset.rope);let i=S.pick.length-1;if(S.pick[i]!==seq[i])return reward(0,.6);if(S.pick.length===3)return reward(1,1.8);return mini()}});
layer.addEventListener('pointerdown',e=>{let v=e.target.closest('[data-drag]');if(!v)return;S.drag={id:e.pointerId,x:e.clientX,y:e.clientY,ox:S.off.x,oy:S.off.y};v.setPointerCapture(e.pointerId)});layer.addEventListener('pointermove',e=>{if(!S.drag||S.drag.id!==e.pointerId)return;S.off.x=Math.max(-360,Math.min(48,S.drag.ox+e.clientX-S.drag.x));S.off.y=Math.max(-110,Math.min(38,S.drag.oy+e.clientY-S.drag.y));let m=layer.querySelector('.mapIn');if(m)m.style.transform=`translate(${S.off.x}px,${S.off.y}px)`});['pointerup','pointercancel'].forEach(x=>layer.addEventListener(x,()=>S.drag=null));
function render(){S.mode==='start'?start():renderSea()}function loop(n){let dt=Math.min(.05,(n-S.last)/1000||0);S.last=n;tick(dt);if(S.mode==='sea')renderSea(0);requestAnimationFrame(loop)}render();requestAnimationFrame(loop);
</script></body></html>
