<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Defense Game</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #2f3744, #111318 60%);
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px;
    }
    .hud {
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      padding: 10px;
      text-align: center;
      backdrop-filter: blur(8px);
      font-weight: 700;
    }
    #message {
      width: min(920px, 100%);
      min-height: 28px;
      text-align: center;
      color: #ffd86b;
      font-weight: 800;
    }
    #gameCanvas {
      width: min(920px, 100%);
      aspect-ratio: 2 / 1;
      background: #5d8a2b;
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 18px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.45);
      touch-action: manipulation;
    }
    .hint {
      width: min(920px, 100%);
      text-align: center;
      color: #b8c0cc;
      font-size: 14px;
    }
    @media (max-width: 700px) {
      .hud { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="hud">
    <div class="card" id="level">المستوى: 1</div>
    <div class="card" id="health">صحة القاعدة: 100</div>
    <div class="card" id="score">النقاط: 0</div>
    <div class="card" id="weapon">السلاح: كرة صغيرة</div>
  </div>
  <div id="message"></div>
  <canvas id="gameCanvas" width="920" height="460"></canvas>
  <div class="hint">اضغط على أي مسار لإطلاق الكرة والدفاع عن القاعدة.</div>
  <script src="game.js"></script>
</body>
</html>
