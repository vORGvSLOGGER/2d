<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Sea Tycoon</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#020817;color:white;font-family:Tahoma,Arial,sans-serif}*{box-sizing:border-box}button{font:inherit;border:0;color:white}.app{position:fixed;inset:0;display:grid;grid-template-rows:auto 1fr auto;background:linear-gradient(#06233d,#020817)}.top{padding:8px;display:grid;grid-template-columns:1fr 1fr;gap:6px}.chip{background:#071b2ecc;border:1px solid #22d3ee66;border-radius:14px;padding:8px;font-size:12px}.stage{min-height:0}.stage canvas{width:100%;height:100%;display:block}.bottom{padding:8px;display:grid;gap:7px;padding-bottom:calc(8px + env(safe-area-inset-bottom))}.row{display:grid;gap:6px}.lanes{grid-template-columns:repeat(5,1fr)}.tools{grid-template-columns:repeat(4,1fr)}.btn{height:46px;border-radius:14px;background:#0b2b45;border:1px solid #22d3ee66;font-weight:900}.gold{background:#b45309}.screen{position:fixed;inset:0;display:grid;place-items:end;padding:20px;background:#020817ee}.hide{display:none}.title{font-size:46px;line-height:.9;font-weight:900;color:#22d3ee}.modes{display:grid;gap:10px;margin-top:18px}.panel{width:100%;max-width:520px}.prep{position:fixed;inset:0;background:#020817;padding:14px;overflow:auto}.rooms{display:grid;grid-template-columns:1fr 1fr;gap:8px}.room{background:#0b2b45;border:1px solid #22d3ee55;border-radius:18px;padding:12px}.start{position:fixed;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));height:54px;border-radius:18px;background:#0891b2;font-weight:900}@media(min-width:700px){.top{grid-template-columns:repeat(4,1fr)}.modes{grid-template-columns:repeat(3,1fr)}.rooms{grid-template-columns:repeat(4,1fr)}} </style></head><body><div class="app"><div class="top"><div class="chip" id="a">درع</div><div class="chip" id="b">ذهب</div><div class="chip" id="c">طاقة</div><div class="chip" id="d">موجة</div></div><div class="stage"><canvas id="cv"></canvas></div><div class="bottom"><div class="row lanes"><button class="btn" onclick="tap(0)">1</button><button class="btn" onclick="tap(1)">2</button><button class="btn" onclick="tap(2)">3</button><button class="btn" onclick="tap(3)">4</button><button class="btn" onclick="tap(4)">5</button></div><div class="row tools"><button class="btn gold" onclick="skill('q')">موجة</button><button class="btn gold" onclick="skill('w')">إصلاح</button><button class="btn gold" onclick="skill('e')">سرعة</button><button class="btn gold" onclick="skill('r')">تجميد</button></div></div></div><div id="menu" class="screen"><div class="panel"><div class="title">SEA TYCOON</div><p>نسخة جوال خفيفة ومضبوطة على الشاشة.</p><div class="modes"><button class="btn" onclick="begin('normal')">عادي</button><button class="btn" onclick="begin('fast')">سريع</button><button class="btn" onclick="begin('endless')">لا نهاية</button></div></div></div><div id="prep" class="prep hide"></div><script>var cv=document.getElementById('cv'),g=cv.getContext('2d'),W=0,H=0,state='menu',mode='normal',wave=0,gold=180,lv=[0,0,0,0,0,0,0,0],shield=250,maxShield=250,energy=24,boats=[],dots=[],left=0,timer=0,last=0,boost=0,stopper=0;function fit(){var r=cv.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,2);W=r.width;H=r.height;cv.width=W*d;cv.height=H*d;g.setTransform(d,0,0,d,0,0)}addEventListener('resize',fit);fit();function yy(i){return H*((i+.5)/5)}function st(){return{shield:240+lv[0]*40,power:24+lv[1]*8,wait:Math.max(.16,.55-lv[2]*.07),energy:24+lv[3]*5,bonus:1+lv[5]*.14}}function price(i){return Math.floor(80*Math.pow(1.6,lv[i])+i*18)}function begin(m){mode=m;wave=0;gold=180;lv=[0,0,0,0,0,0,0,0];prep()}function prep(){state='prep';document.getElementById('menu').classList.add('hide');var names=['القيادة','المدافع','المحركات','الترسانة','الدرع','المخزن','الرادار','الطاقم'];var h='<h2>التجهيز - موجة '+(wave+1)+'</h2><p>ذهب '+gold+'</p><div class="rooms">';for(var i=0;i<8;i++)h+='<div class="room"><b>'+names[i]+'</b><p>LV '+lv[i]+'/5</p><button class="btn" onclick="up('+i+')">ترقية '+price(i)+'</button></div>';h+='</div><button class="start" onclick="run()">ابدأ</button>';var p=document.getElementById('prep');p.innerHTML=h;p.classList.remove('hide')}function up(i){if(gold>=price(i)&&lv[i]<5){gold-=price(i);lv[i]++;prep()}}function run(){state='play';document.getElementById('prep').classList.add('hide');var s=st();wave++;shield=maxShield=s.shield;energy=s.energy;boats=[];dots=[];left=7+wave*2+(wave%3==0?1:0);timer=0}function boat(){var l=Math.floor(Math.random()*5),big=wave%3==0&&left==1,o=big?{x:W+30,l:l,v:28,val:140,h:900,m:900,col:'#f97316'}:{x:W+30,l:l,v:45+Math.random()*35,val:14+wave*2,h:80+wave*8,m:80+wave*8,col:['#22c55e','#facc15','#ef4444'][Math.floor(Math.random()*3)]};if(mode=='fast'){o.v*=1.5;o.val*=2}boats.push(o);left--}function tap(l,free){var n=performance.now()/1000,s=st();if(!free&&n-last<s.wait)return;if(!free&&energy<=0)return;if(!free){energy--;last=n}dots.push({x:45,l:l,p:s.power*(boost>0?1.25:1),v:560*(boost>0?1.7:1)})}function skill(k){if(k=='q')for(var i=0;i<5;i++)tap(i,true);if(k=='w')shield=Math.min(maxShield,shield+maxShield*.25);if(k=='e')boost=6;if(k=='r')stopper=3}function finish(ok){state='menu';document.getElementById('menu').classList.remove('hide');document.querySelector('.title').innerHTML=ok?'WAVE CLEAR':'SEA TYCOON'}function update(dt){if(state!='play')return;boost=Math.max(0,boost-dt);stopper=Math.max(0,stopper-dt);timer-=dt;if(left>0&&timer<=0){boat();timer=Math.max(.45,1.1-wave*.02)}var sp=stopper>0?0:1;boats.slice().forEach(function(o){o.x-=o.v*sp*dt;if(o.x<25){shield-=32;boats.splice(boats.indexOf(o),1)}});dots.slice().forEach(function(d){d.x+=d.v*dt;if(d.x>W+20)dots.splice(dots.indexOf(d),1);boats.slice().forEach(function(o){if(o.l==d.l&&Math.abs(o.x-d.x)<30){o.h-=d.p;dots.splice(dots.indexOf(d),1);if(o.h<=0){var add=Math.floor(o.val*st().bonus);gold+=add;boats.splice(boats.indexOf(o),1)}}})});document.getElementById('a').textContent='درع '+Math.max(0,Math.floor(shield))+'/'+maxShield;document.getElementById('b').textContent='ذهب '+gold;document.getElementById('c').textContent='طاقة '+energy;document.getElementById('d').textContent='موجة '+wave;if(shield<=0)finish(false);if(left<=0&&boats.length==0){gold+=40+wave*18;finish(true)}}function draw(){g.clearRect(0,0,W,H);g.fillStyle='#082f49';g.fillRect(0,0,W,H);for(var i=0;i<5;i++){g.strokeStyle='#38bdf855';g.beginPath();g.moveTo(0,yy(i));g.lineTo(W,yy(i));g.stroke()}g.fillStyle='#2563eb';g.fillRect(8,20,34,H-40);boats.forEach(function(o){g.fillStyle=o.col;g.fillRect(o.x-25,yy(o.l)-16,50,32);g.fillStyle='#22c55e';g.fillRect(o.x-25,yy(o.l)-24,50*Math.max(0,o.h/o.m),4)});dots.forEach(function(d){g.fillStyle='#facc15';g.beginPath();g.arc(d.x,yy(d.l),6,0,7);g.fill()})}var lt=performance.now();function loop(t){var dt=(t-lt)/1000;lt=t;update(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop)</script></body></html>
