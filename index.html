<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>Sea Tycoon Defense</title><style>:root{--bg:#020817;--panel:#071a2d;--panel2:#0d2a43;--line:#164e63;--cyan:#22d3ee;--gold:#facc15;--green:#22c55e;--red:#ef4444;--white:#eef9ff;--muted:#9fb6c9}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:Tahoma,Arial,sans-serif}button{font:inherit;border:0;color:var(--white);cursor:pointer;touch-action:manipulation}.app{position:fixed;inset:0;min-height:100dvh;background:radial-gradient(circle at 70% 0,#0ea5e955,transparent 34%),linear-gradient(180deg,#021222,#05233b 55%,#03101f);overflow:hidden}.screen{position:absolute;inset:0;display:none}.show{display:block}.menu{display:grid;align-content:end;padding:24px 16px 34px}.hero{display:grid;gap:14px}.badge{width:max-content;padding:7px 11px;border:1px solid #67e8f966;border-radius:99px;color:#a5f3fc;background:#083344aa;font-weight:900;font-size:12px}.title{font-size:clamp(42px,13vw,76px);line-height:.88;font-weight:1000;letter-spacing:-2px;text-align:right}.desc{margin:0;color:#c7d8e8;line-height:1.8;font-size:14px}.modes{display:grid;gap:10px;margin-top:6px}.mode{min-height:76px;padding:13px 14px;border-radius:22px;background:linear-gradient(135deg,#0b314f,#0f766e);border:1px solid #67e8f966;text-align:right;box-shadow:0 20px 50px #0008}.mode b{display:block;font-size:18px}.mode span{display:block;color:#d7f7ff;font-size:12px;margin-top:5px}.top{position:absolute;top:env(safe-area-inset-top);left:0;right:0;padding:8px;display:grid;grid-template-columns:1fr 1fr;gap:6px;z-index:5}.chip{min-height:38px;border:1px solid #67e8f944;background:#031525d8;border-radius:14px;padding:7px 9px;font-size:12px;display:flex;align-items:center;justify-content:space-between;gap:5px}.chip b{color:var(--gold)}.stage{position:absolute;left:0;right:0;top:112px;bottom:172px;overflow:hidden}.stage canvas{width:100%;height:100%;display:block}.bottom{position:absolute;left:0;right:0;bottom:env(safe-area-inset-bottom);padding:8px;z-index:6;display:grid;gap:7px}.row{display:grid;gap:6px}.lanes{grid-template-columns:repeat(5,1fr)}.abilities{grid-template-columns:repeat(4,1fr)}.btn{height:48px;border-radius:15px;background:linear-gradient(180deg,#12395a,#071a2d);border:1px solid #67e8f944;font-weight:900;font-size:12px}.btn.gold{background:linear-gradient(135deg,#92400e,#f59e0b);color:#111827}.prep{padding:calc(env(safe-area-inset-top) + 12px) 12px 14px;overflow:auto}.prep h1{margin:0 0 8px;font-size:28px}.prepbar{display:flex;gap:7px;align-items:center;margin-bottom:10px}.pill{padding:7px 10px;border-radius:99px;background:#09233a;border:1px solid #67e8f944;color:#cdefff;font-size:12px}.rooms{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-bottom:88px}.room{min-height:104px;padding:11px;border-radius:18px;background:linear-gradient(180deg,#0b2943,#061827);border:1px solid #67e8f944;text-align:right;position:relative}.room h3{margin:0;font-size:15px}.room p{margin:6px 0;color:var(--muted);font-size:11px}.cost{color:var(--gold);font-size:12px;font-weight:900}.up{position:absolute;left:9px;bottom:9px;padding:8px 11px;border-radius:12px;background:#155e75}.start{position:fixed;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 12px);height:56px;border-radius:18px;background:linear-gradient(135deg,#06b6d4,#7c3aed);font-weight:1000;font-size:16px;box-shadow:0 18px 44px #0009}.result{display:grid;place-items:center;padding:18px;text-align:center;background:#020817e8}.card{width:min(430px,100%);padding:22px;border-radius:28px;background:#061827;border:1px solid #67e8f955;box-shadow:0 20px 60px #0009}.card h2{font-size:42px;margin:0 0 8px;color:var(--cyan)}.card p{line-height:2;color:#d3e5f2}.card button{width:100%;height:54px;border-radius:18px;background:#0891b2;font-weight:900}@media(min-width:760px){.menu{align-content:center;padding:44px}.hero{max-width:780px}.modes{grid-template-columns:repeat(3,1fr)}.top{grid-template-columns:repeat(4,1fr);padding:14px}.stage{top:80px;bottom:128px}.bottom{grid-template-columns:1.2fr 1fr;padding:14px}.rooms{grid-template-columns:repeat(4,1fr);max-width:1050px}.prep{padding:34px}.start{width:360px;right:auto;left:34px}}@media(max-height:680px){.stage{top:96px;bottom:150px}.btn{height:42px}.chip{min-height:33px}.room{min-height:92px}.prep h1{font-size:22px}}</style></head><body><main class="app"><section id="menu" class="screen menu show"><div class="hero"><div class="badge">نسخة جوال محسّنة</div><div class="title">SEA TYCOON<br>DEFENSE</div><p class="desc">ابنِ سفينتك من الداخل، ثم ادخل معركة بحرية بخمس مسارات. التصميم الآن Mobile First ومضبوط على شاشة الجوال.</p><div class="modes"><button class="mode" onclick="start('normal')"><b>⚓ عادي</b><span>تجهيز + دفاع كامل</span></button><button class="mode" onclick="start('blitz')"><b>⚡ بليتز x2</b><span>سرعة أعلى وذهب أكثر</span></button><button class="mode" onclick="start('endless')"><b>♾️ لا نهاية</b><span>اختبار الصمود</span></button></div></div></section><section id="prep" class="screen prep"></section><section id="battle" class="screen"><div class="top"><div class="chip">الدرع <b id="hp">0</b></div><div class="chip">الذهب <b id="gold">0</b></div><div class="chip">الذخيرة <b id="ammo">0</b></div><div class="chip">الموجة <b id="wave">0</b></div></div><div class="stage"><canvas id="cv"></canvas></div><div class="bottom"><div class="row lanes"><button class="btn" onclick="fire(0)">1</button><button class="btn" onclick="fire(1)">2</button><button class="btn" onclick="fire(2)">3</button><button class="btn" onclick="fire(3)">4</button><button class="btn" onclick="fire(4)">5</button></div><div class="row abilities"><button class="btn gold" onclick="ability('q')">وابل</button><button class="btn gold" onclick="ability('w')">إصلاح</button><button class="btn gold" onclick="ability('e')">سرعة</button><button class="btn gold" onclick="ability('r')">EMP</button></div></div></section><section id="result" class="screen result"></section></main><script>const $=id=>document.getElementById(id),cv=$('cv'),ctx=cv.getContext('2d'),names=['القيادة','المدافع','المحركات','الترسانة','الدرع','المخزن','الرادار','الطاقم'];let mode='normal',state='menu',wave=0,gold=180,lv=names.map(_=>0),hp=0,maxHp=0,ammo=0,en=[],bul=[],left=0,spawn=0,kills=0,earned=0,last=0,cd={q:0,w:0,e:0,r:0},freeze=0,fast=0,W=0,H=0;function show(id){['menu','prep','battle','result'].forEach(s=>$(s).classList.toggle('show',s==id));state=id;resize()}function resize(){let r=cv.parentElement?.getBoundingClientRect();if(r){W=cv.width=Math.max(320,r.width*devicePixelRatio);H=cv.height=Math.max(260,r.height*devicePixelRatio);ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);W=r.width;H=r.height}}addEventListener('resize',resize);function stat(){return{hp:230+lv[0]*42,pow:24+lv[1]*8,delay:Math.max(.16,.55-lv[2]*.07),ammo:24+lv[3]*5,armor:Math.min(.45,lv[4]*.05),bonus:1+lv[5]*.14,cool:Math.max(.45,1-lv[7]*.08)}}function cost(i){return Math.floor(80*Math.pow(1.6,lv[i])+i*18)}function start(m){mode=m;wave=0;gold=180;lv=names.map(_=>0);prep()}function prep(){show('prep');let html='<h1>مرحلة التجهيز</h1><div class="prepbar"><span class="pill">الموجة '+(wave+1)+'</span><span class="pill">ذهب '+gold+'</span></div><div class="rooms">';names.forEach((n,i)=>html+='<div class="room"><h3>'+n+'</h3><p>مستوى '+lv[i]+'/5</p><div class="cost">تكلفة '+cost(i)+'</div><button class="up" onclick="up('+i+')">ترقية</button></div>');html+='</div><button class="start" onclick="battle()">ابدأ الهجوم</button>';$('prep').innerHTML=html}function up(i){if(lv[i]<5&&gold>=cost(i)){gold-=cost(i);lv[i]++;prep()}}function battle(){let s=stat();wave++;hp=maxHp=s.hp;ammo=s.ammo;en=[];bul=[];left=7+wave*2+(wave%3==0?1:0);spawn=0;kills=0;earned=0;last=0;freeze=0;fast=0;cd={q:0,w:0,e:0,r:0};show('battle')}function laneY(i){return H*((i+.5)/5)}function enemy(){let boss=wave%3==0&&left==1,l=Math.floor(Math.random()*5),e=boss?{hp:900+wave*25,spd:28,coin:140,col:'#f97316',boss:1}:{hp:75+wave*8,spd:42+Math.random()*32,coin:14+wave*2,col:['#22c55e','#facc15','#ef4444'][Math.floor(Math.random()*3)]};if(mode=='blitz'){e.spd*=1.5;e.coin*=2}e.max=e.hp;e.x=W+40;e.l=l;en.push(e);left--}function fire(l,free){let now=performance.now()/1000,s=stat();if(!free&&now-last<s.delay)return;if(!free&&ammo<=0)return;if(!free){ammo--;last=now}bul.push({x:46,l,p:s.pow*(fast>0?1.25:1),v:560*(fast>0?1.7:1)})}function ability(k){let s=stat();if(state!='battle'||cd[k]>0)return;if(k=='q'){for(let i=0;i<5;i++)fire(i,true);cd.q=10*s.cool}if(k=='w'){hp=Math.min(maxHp,hp+maxHp*.25);cd.w=15*s.cool}if(k=='e'){fast=6;cd.e=9*s.cool}if(k=='r'){freeze=3.5;cd.r=13*s.cool}}function done(win){if(win){let b=Math.floor((40+wave*18)*stat().bonus*(mode=='blitz'?2:1));gold+=b;earned+=b}show('result');$('result').innerHTML='<div class="card"><h2>'+(win?'نجحت':'سقطت السفينة')+'</h2><p>الموجة: '+wave+'<br>القتل: '+kills+'<br>الذهب المكتسب: '+earned+'</p><button onclick="'+(win?'prep()':'show(\'menu\')')+'">'+(win?'الموجة التالية':'القائمة')+'</button></div>'}function update(dt){if(state!='battle')return;Object.keys(cd).forEach(k=>cd[k]=Math.max(0,cd[k]-dt));freeze=Math.max(0,freeze-dt);fast=Math.max(0,fast-dt);spawn-=dt;if(left>0&&spawn<=0){enemy();spawn=Math.max(.45,1.15-wave*.02)}let es=freeze>0?0:1;en.slice().forEach(e=>{e.x-=e.spd*es*dt;if(e.x<30){hp-=34*(1-stat().armor);en.splice(en.indexOf(e),1)}});bul.slice().forEach(b=>{b.x+=b.v*dt;if(b.x>W+20)bul.splice(bul.indexOf(b),1);en.slice().forEach(e=>{if(e.l==b.l&&Math.abs(e.x-b.x)<30){e.hp-=b.p;bul.splice(bul.indexOf(b),1);if(e.hp<=0){let g=Math.floor(e.coin*stat().bonus);gold+=g;earned+=g;kills++;en.splice(en.indexOf(e),1)}}})});$('hp').textContent=Math.max(0,Math.floor(hp))+'/'+maxHp;$('gold').textContent=gold;$('ammo').textContent=ammo;$('wave').textContent=wave;if(hp<=0)done(false);if(left<=0&&en.length==0)done(true)}function draw(){if(state!='battle')return;ctx.clearRect(0,0,W,H);let grd=ctx.createLinearGradient(0,0,W,H);grd.addColorStop(0,'#082f49');grd.addColorStop(1,'#03101f');ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);for(let i=0;i<5;i++){let y=laneY(i);ctx.strokeStyle='#1f6b86';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}ctx.fillStyle='#2563eb';round(10,20,34,H-40,18);ctx.fill();en.forEach(e=>{let y=laneY(e.l);ctx.fillStyle=e.col;round(e.x-28,y-17,56,34,16);ctx.fill();ctx.fillStyle='#ef4444';ctx.fillRect(e.x-27,y-25,54,4);ctx.fillStyle='#22c55e';ctx.fillRect(e.x-27,y-25,54*Math.max(0,e.hp/e.max),4)});bul.forEach(b=>{ctx.fillStyle='#facc15';ctx.beginPath();ctx.arc(b.x,laneY(b.l),6,0,7);ctx.fill()})}function round(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r)}let lt=performance.now();function loop(t){let dt=(t-lt)/1000;lt=t;update(dt);draw();requestAnimationFrame(loop)}addEventListener('keydown',e=>{if(state=='menu'&&'123'.includes(e.key))start(['normal','blitz','endless'][e.key-1]);if(state=='battle'){if('12345'.includes(e.key))fire(e.key-1);if('qwer'.includes(e.key.toLowerCase()))ability(e.key.toLowerCase())}});show('menu');requestAnimationFrame(loop)</script></body></html>
